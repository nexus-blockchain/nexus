[workspace.package]
license = "MIT-0"
authors = ["Nexus Team"]
homepage = "https://nexuschain.network/"
repository = "https://github.com/nexus-blockchain/nexus.git"
edition = "2021"

[workspace]
members = [
    "node",
    "pallets/trading/common",
    "pallets/trading/trc20-verifier",
    "pallets/trading/nex-market",
    "pallets/dispute/escrow",
    "pallets/storage/service",
    "pallets/dispute/evidence",
    "pallets/dispute/arbitration",
    "pallets/storage/lifecycle",
# Entity pallets (原 ShareMall，已重构为子模块)
    "pallets/entity/common",
    "pallets/entity/shop",
    "pallets/entity/registry",
    "pallets/entity/token",
    "pallets/entity/governance",
    "pallets/entity/member",
    "pallets/entity/commission/common",
    "pallets/entity/commission/core",
    "pallets/entity/commission/referral",
    "pallets/entity/commission/multi-level",
    "pallets/entity/commission/level-diff",
    "pallets/entity/commission/single-line",
    "pallets/entity/commission/team",
    "pallets/entity/commission/pool-reward",
    "pallets/entity/commission",
    "pallets/entity/product",
    "pallets/entity/order",
    "pallets/entity/market",
    "pallets/entity/review",
    "pallets/entity/disclosure",
    "pallets/entity/kyc",
    "pallets/entity/tokensale",
    "pallets/entity/loyalty",
# Common libraries (共享工具库，非 pallet)
    "common/crypto",
    "common/media",
    "runtime",
# Ads pallets (通用广告系统)
    "pallets/ads/primitives",
    "pallets/ads/core",
    "pallets/ads/grouprobot",
    "pallets/ads/entity",
    "pallets/ads/router",
# GroupRobot pallets
    "pallets/grouprobot/primitives",
    "pallets/grouprobot/registry",
    "pallets/grouprobot/consensus",
    "pallets/grouprobot/community",
    "pallets/grouprobot/ceremony",
    "pallets/grouprobot/subscription",
    "pallets/grouprobot/rewards",
# Inscription pallet (创世铭文)
    "pallets/inscription",
]
resolver = "2"
exclude = ["grouprobot"]

[workspace.dependencies]
nexus-runtime = { path = "./runtime", default-features = false }
# Trading pallets
pallet-trading-common = { path = "./pallets/trading/common", default-features = false }
pallet-trading-trc20-verifier = { path = "./pallets/trading/trc20-verifier", default-features = false }
pallet-nex-market = { path = "./pallets/trading/nex-market", default-features = false }
# Escrow, Referral, IPFS pallets
pallet-dispute-escrow = { path = "./pallets/dispute/escrow", default-features = false }
pallet-storage-service = { path = "./pallets/storage/service", default-features = false }
# Common libraries (共享工具库，非 pallet)
pallet-crypto-common = { path = "./common/crypto", default-features = false }
media-utils = { path = "./common/media", default-features = false }
# Evidence pallet
pallet-dispute-evidence = { path = "./pallets/dispute/evidence", default-features = false }
# Arbitration pallet
pallet-dispute-arbitration = { path = "./pallets/dispute/arbitration", default-features = false }
# Storage lifecycle pallet
pallet-storage-lifecycle = { path = "./pallets/storage/lifecycle", default-features = false }
# Entity pallets (原 ShareMall，已重构为子模块)
pallet-entity-common = { path = "./pallets/entity/common", default-features = false }
pallet-entity-shop = { path = "./pallets/entity/shop", default-features = false }
pallet-entity-registry = { path = "./pallets/entity/registry", default-features = false }
pallet-entity-token = { path = "./pallets/entity/token", default-features = false }
pallet-entity-governance = { path = "./pallets/entity/governance", default-features = false }
pallet-entity-member = { path = "./pallets/entity/member", default-features = false }
pallet-commission-common = { path = "./pallets/entity/commission/common", default-features = false }
pallet-commission-core = { path = "./pallets/entity/commission/core", default-features = false }
pallet-commission-referral = { path = "./pallets/entity/commission/referral", default-features = false }
pallet-commission-multi-level = { path = "./pallets/entity/commission/multi-level", default-features = false }
pallet-commission-level-diff = { path = "./pallets/entity/commission/level-diff", default-features = false }
pallet-commission-single-line = { path = "./pallets/entity/commission/single-line", default-features = false }
pallet-commission-team = { path = "./pallets/entity/commission/team", default-features = false }
pallet-commission-pool-reward = { path = "./pallets/entity/commission/pool-reward", default-features = false }
pallet-entity-commission = { path = "./pallets/entity/commission", default-features = false }
pallet-entity-product = { path = "./pallets/entity/product", default-features = false }
pallet-entity-order = { path = "./pallets/entity/order", default-features = false }
pallet-entity-market = { path = "./pallets/entity/market", default-features = false }
pallet-entity-review = { path = "./pallets/entity/review", default-features = false }
pallet-entity-disclosure = { path = "./pallets/entity/disclosure", default-features = false }
pallet-entity-kyc = { path = "./pallets/entity/kyc", default-features = false }
pallet-entity-tokensale = { path = "./pallets/entity/tokensale", default-features = false }
pallet-entity-loyalty = { path = "./pallets/entity/loyalty", default-features = false }
# Ads pallets (通用广告系统)
pallet-ads-primitives = { path = "./pallets/ads/primitives", default-features = false }
pallet-ads-core = { path = "./pallets/ads/core", default-features = false }
pallet-ads-grouprobot = { path = "./pallets/ads/grouprobot", default-features = false }
pallet-ads-entity = { path = "./pallets/ads/entity", default-features = false }
pallet-ads-router = { path = "./pallets/ads/router", default-features = false }
# GroupRobot pallets
pallet-grouprobot-primitives = { path = "./pallets/grouprobot/primitives", default-features = false }
pallet-grouprobot-registry = { path = "./pallets/grouprobot/registry", default-features = false }
pallet-grouprobot-consensus = { path = "./pallets/grouprobot/consensus", default-features = false }
pallet-grouprobot-community = { path = "./pallets/grouprobot/community", default-features = false }
pallet-grouprobot-ceremony = { path = "./pallets/grouprobot/ceremony", default-features = false }
pallet-grouprobot-subscription = { path = "./pallets/grouprobot/subscription", default-features = false }
pallet-grouprobot-rewards = { path = "./pallets/grouprobot/rewards", default-features = false }
# Inscription pallet (创世铭文)
pallet-inscription = { path = "./pallets/inscription", default-features = false }
# Additional dependencies
hex = { version = "0.4", default-features = false, features = ["alloc"] }
sp-application-crypto = { version = "44.0.0", default-features = false }
