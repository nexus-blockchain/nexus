[package]
name = "pallet-nex-market"
version = "0.1.0"
description = "NEX/USDT P2P 交易市场模块 — 无做市商订单簿模型"
authors = ["Nexus Team"]
edition = "2021"
license = "Unlicense"
publish = false
repository = "https://github.com/memoio/nexus"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
sp-io = { workspace = true }
sp-core = { workspace = true }
sp-api = { workspace = true }
log = { workspace = true }
serde = { workspace = true, optional = true }
pallet-trading-trc20-verifier = { workspace = true }
pallet-trading-common = { workspace = true }

[dev-dependencies]
sp-core = { workspace = true }
sp-io = { workspace = true }
pallet-balances = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"scale-info/std",
	"frame-support/std",
	"frame-system/std",
	"sp-runtime/std",
	"sp-std/std",
	"sp-io/std",
	"sp-core/std",
	"sp-api/std",
	"log/std",
	"serde/std",
	"pallet-trading-trc20-verifier/std",
	"pallet-trading-common/std",
	"pallet-balances/std",
]
runtime-benchmarks = [
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"sp-runtime/runtime-benchmarks",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"sp-runtime/try-runtime",
]
