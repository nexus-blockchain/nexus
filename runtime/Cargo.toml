[package]
name = "nexus-runtime"
description = "Nexus blockchain runtime built with Substrate, part of Polkadot Sdk."
version = "0.1.0"
license = "Unlicense"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
publish = false

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
hex = { version = "0.4", default-features = false, features = ["alloc"] }
frame-benchmarking = { optional = true, workspace = true }
frame-executive = { workspace = true }
frame-metadata-hash-extension = { workspace = true }
frame-support = { features = ["experimental", "tuples-96"], workspace = true }
frame-system-benchmarking = { optional = true, workspace = true }
frame-system-rpc-runtime-api = { workspace = true }
frame-system = { workspace = true }
frame-try-runtime = { optional = true, workspace = true }
pallet-aura = { workspace = true }
pallet-balances = { workspace = true }
pallet-grandpa = { workspace = true }
pallet-session = { workspace = true }
pallet-offences = { workspace = true }
pallet-authorship = { workspace = true }
pallet-sudo = { workspace = true }
pallet-collective = { workspace = true }
pallet-collective-membership = { workspace = true }
pallet-timestamp = { workspace = true }
pallet-transaction-payment-rpc-runtime-api = { workspace = true }
pallet-transaction-payment = { workspace = true }
# Contracts pallet
pallet-contracts = { workspace = true }
# Trading pallets
pallet-trading-common = { workspace = true }
pallet-nex-market = { workspace = true }
# Escrow, Referral, IPFS pallets
pallet-dispute-escrow = { workspace = true }
pallet-storage-service = { workspace = true }
# Evidence pallet
pallet-dispute-evidence = { workspace = true }
# Arbitration pallet
pallet-dispute-arbitration = { workspace = true }
# Storage lifecycle pallet
pallet-storage-lifecycle = { workspace = true }
# Assets pallet
pallet-assets = { workspace = true }
# Entity pallets (原 ShareMall，已重构)
pallet-entity-common = { workspace = true }
pallet-entity-registry = { workspace = true }
pallet-entity-shop = { workspace = true }
pallet-entity-token = { workspace = true }
pallet-entity-governance = { workspace = true }
pallet-entity-member = { workspace = true }
pallet-commission-common = { workspace = true }
pallet-commission-core = { workspace = true }
pallet-commission-referral = { workspace = true }
pallet-commission-multi-level = { workspace = true }
pallet-commission-level-diff = { workspace = true }
pallet-commission-single-line = { workspace = true }
pallet-commission-team = { workspace = true }
pallet-commission-pool-reward = { workspace = true }
pallet-entity-commission = { workspace = true }
pallet-entity-product = { workspace = true }
pallet-entity-order = { workspace = true }
pallet-entity-market = { workspace = true }
pallet-entity-review = { workspace = true }
pallet-entity-disclosure = { workspace = true }
pallet-entity-kyc = { workspace = true }
pallet-entity-tokensale = { workspace = true }
# GroupRobot pallets
pallet-grouprobot-primitives = { workspace = true }
pallet-grouprobot-registry = { workspace = true, features = ["dcap-verify"] }
pallet-grouprobot-consensus = { workspace = true }
pallet-grouprobot-subscription = { workspace = true }
pallet-grouprobot-rewards = { workspace = true }
pallet-grouprobot-community = { workspace = true }
pallet-grouprobot-ceremony = { workspace = true }
# Ads pallets (modular advertising engine)
pallet-ads-primitives = { workspace = true }
pallet-ads-core = { workspace = true }
pallet-ads-grouprobot = { workspace = true }
pallet-ads-entity = { workspace = true }
pallet-ads-router = { workspace = true }
# Inscription pallet (创世铭文)
pallet-inscription = { workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true }
serde_json = { workspace = true, default-features = false, features = ["alloc"] }
sp-api = { workspace = true }
sp-block-builder = { workspace = true }
sp-consensus-aura = { features = ["serde"], workspace = true }
sp-consensus-grandpa = { features = ["serde"], workspace = true }
sp-core = { features = ["serde"], workspace = true }
sp-genesis-builder = { workspace = true }
sp-inherents = { workspace = true }
sp-keyring = { workspace = true }
sp-offchain = { workspace = true }
sp-runtime = { features = ["serde"], workspace = true }
sp-session = { workspace = true }
sp-staking = { workspace = true }
sp-storage = { workspace = true }
sp-transaction-pool = { workspace = true }
sp-version = { features = ["serde"], workspace = true }

[build-dependencies]
substrate-wasm-builder = { optional = true, workspace = true, default-features = true }

