runtime-benchmarks = [
	"frame-benchmarking/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system-benchmarking/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"pallet-balances/runtime-benchmarks",
	"pallet-grandpa/runtime-benchmarks",
	"pallet-session/runtime-benchmarks",
	"pallet-offences/runtime-benchmarks",
	"pallet-sudo/runtime-benchmarks",
	"pallet-collective/runtime-benchmarks",
	"pallet-collective-membership/runtime-benchmarks",
	"pallet-timestamp/runtime-benchmarks",
	"pallet-transaction-payment/runtime-benchmarks",
	# Contracts pallet benchmarks
	"pallet-contracts/runtime-benchmarks",
	# Trading pallets benchmarks
	"pallet-nex-market/runtime-benchmarks",
	# Escrow, Referral pallets benchmarks
	# Evidence pallet benchmarks
	"pallet-dispute-evidence/runtime-benchmarks",
	# Arbitration pallet benchmarks
	"pallet-dispute-arbitration/runtime-benchmarks",
